services:
  db:
    image: postgres:15
    container_name: owh-postgres
    environment:
      POSTGRES_USER: owh
      POSTGRES_PASSWORD: ${DB_PASSWORD:-owh}
      POSTGRES_DB: owh
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - owh-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U owh"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: owh-backend
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE__URL: postgresql+psycopg://owh:${DB_PASSWORD:-owh}@db:5432/owh
      SECURITY__SECRET_KEY: ${SECRET_KEY}
      SECURITY__EMAIL_HASH_SECRET: ${EMAIL_HASH_SECRET}
      SECURITY__TOKEN_EXP_HOURS: ${SECURITY__TOKEN_EXP_HOURS:-2160}
      EMAIL__FROM_ADDRESS: ${EMAIL__FROM_ADDRESS:-verify@mail.openworkinghours.org}
      EMAIL__NOTIFICATION_EMAIL: ${EMAIL__NOTIFICATION_EMAIL:-}
      EMAIL__SMTP_HOST: ${EMAIL__SMTP_HOST:-smtp-relay.brevo.com}
      EMAIL__SMTP_PORT: ${EMAIL__SMTP_PORT:-587}
      EMAIL__SMTP_USERNAME: ${EMAIL__SMTP_USERNAME}
      EMAIL__SMTP_PASSWORD: ${EMAIL__SMTP_PASSWORD}
      EMAIL__USE_TLS: ${EMAIL__USE_TLS:-true}
      ALLOWED_EMAIL_DOMAINS_FILE: /app/config/allowed_domains.txt
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS:-["https://openworkinghours.org","https://www.openworkinghours.org"]}
      DOCS_ENABLED: ${DOCS_ENABLED:-false}
      SOCIAL_AUTH__GOOGLE_CLIENT_ID: ${SOCIAL_AUTH__GOOGLE_CLIENT_ID:-}
      # Demo account for Apple App Store review (optional)
      DEMO__EMAIL: ${DEMO__EMAIL:-}
      DEMO__CODE: ${DEMO__CODE:-}
    volumes:
      # Hospital directory CSV lives at the repo root, outside the backend/
      # build context — without this mount /taxonomy/hospitals is silently
      # empty (the loader logs a warning and serves []).
      - ../datasets/german_hospitals/output:/datasets/german_hospitals/output:ro
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - owh-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  owh-network:
    driver: bridge
